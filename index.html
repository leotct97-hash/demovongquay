<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ thống bốc thăm câu hỏi</title>

  <!-- Montserrat có đầy đủ bộ ký tự tiếng Việt. Nếu mất Internet, web tự chuyển sang Arial. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Cần Internet khi mở trang để tải thư viện đọc Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --red: #c8102e;
      --red-dark: #850016;
      --red-deep: #630010;
      --gold: #f5c542;
      --gold-light: #ffe99a;
      --white: #ffffff;
      --off-white: #fffaf0;
      --text: #252525;
      --muted: #6b7280;
      --line: #ead89a;
      --success: #177545;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(92, 0, 16, 0.16);
      --font-ui: "Montserrat", Arial, Helvetica, sans-serif;
      --font-content: Arial, "Montserrat", Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: var(--font-ui);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(245, 197, 66, 0.25), transparent 26%),
        radial-gradient(circle at 90% 92%, rgba(200, 16, 46, 0.12), transparent 30%),
        #f4f4f4;
    }

    button, input, select, textarea { font: inherit; }

    /* Nội dung câu hỏi ưu tiên Arial để tiếng Việt rõ, dễ đọc trên máy chiếu. */
    .question-content,
    #modalQuestionContent {
      font-family: var(--font-content);
    }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none !important; }

    .app {
      width: min(1420px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px;
    }

    .shell {
      min-height: calc(100vh - 28px);
      overflow: hidden;
      border: 2px solid rgba(99, 0, 16, 0.14);
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .header {
      position: relative;
      overflow: hidden;
      min-height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 190px;
      background: linear-gradient(135deg, var(--red-deep), var(--red));
      color: var(--white);
      border-bottom: 5px solid var(--gold);
    }

    .header::before,
    .header::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 22px solid rgba(245, 197, 66, 0.18);
    }

    .header::before { left: -72px; top: -94px; }
    .header::after { right: -72px; bottom: -105px; }

    .header h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(30px, 4vw, 54px);
      letter-spacing: 0.025em;
      text-transform: uppercase;
    }

    .fullscreen-btn {
      position: absolute;
      z-index: 2;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      min-height: 44px;
      border: 2px solid rgba(255, 255, 255, 0.75);
      border-radius: 10px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.11);
      color: var(--white);
      font-size: 13px;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--off-white);
      border-top: 1px solid var(--line);
    }

    .file-label {
      min-width: 0;
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 9px 14px;
      overflow: hidden;
      border: 2px dashed #cfaa30;
      border-radius: 11px;
      background: var(--white);
      color: var(--red-dark);
      font-weight: 800;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    #excelFile {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    .small-btn {
      min-height: 46px;
      border: 2px solid var(--red);
      border-radius: 11px;
      padding: 0 15px;
      background: var(--white);
      color: var(--red-dark);
      font-weight: 800;
    }

    .small-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #fff4d0;
    }

    .main {
      min-height: calc(100vh - 237px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(24px, 4vw, 52px);
      background:
        linear-gradient(rgba(255, 255, 255, 0.965), rgba(255, 255, 255, 0.965)),
        repeating-linear-gradient(45deg, #f5c542 0 2px, transparent 2px 22px);
    }

    .draw-grid {
      width: min(1040px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(28px, 7vw, 110px);
    }

    .draw-card {
      position: relative;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 22px 28px;
      border: 5px solid var(--gold);
      border-radius: 16px;
      background: linear-gradient(160deg, var(--red-dark), var(--red));
      box-shadow: 0 18px 40px rgba(99, 0, 16, 0.2);
    }

    .draw-card::after {
      content: "";
      position: absolute;
      inset: 8px;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
    }

    .card-label {
      position: relative;
      z-index: 1;
      width: 100%;
      border: 2px solid var(--gold);
      border-radius: 7px;
      padding: 12px 10px;
      background: rgba(99, 0, 16, 0.72);
      color: var(--gold);
      text-align: center;
      font-size: clamp(22px, 2.4vw, 31px);
      font-weight: 900;
      text-transform: uppercase;
    }

    .card-value {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 6px 8px;
      color: var(--white);
      font-size: clamp(88px, 11vw, 150px);
      font-weight: 950;
      line-height: 1;
      text-align: center;
      overflow-wrap: anywhere;
      text-shadow: 0 7px 18px rgba(0, 0, 0, 0.28);
    }

    .card-value.rolling {
      animation: pulse 0.1s linear infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(0.98); opacity: 0.78; }
      to { transform: scale(1.025); opacity: 1; }
    }

    .card-line {
      position: relative;
      z-index: 1;
      width: 78%;
      border-bottom: 3px solid var(--gold-light);
    }

    .controls {
      width: min(720px, 100%);
      margin: 38px auto 0;
      text-align: center;
    }

    .spin-btn {
      width: min(500px, 100%);
      min-height: 66px;
      border: 3px solid var(--red-dark);
      border-radius: 12px;
      padding: 12px 22px;
      background: linear-gradient(180deg, #ffe77f, var(--gold));
      color: #3f090f;
      font-size: clamp(21px, 2.3vw, 30px);
      font-weight: 950;
      box-shadow: 0 7px 0 #c18a00, 0 15px 28px rgba(99, 0, 16, 0.18);
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #c18a00, 0 9px 20px rgba(99, 0, 16, 0.16);
    }

    .status {
      min-height: 25px;
      margin: 22px 0 0;
      color: var(--red-dark);
      font-size: 17px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .secondary-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .view-btn {
      min-height: 47px;
      border: 2px solid var(--red);
      border-radius: 10px;
      padding: 0 20px;
      background: var(--red);
      color: var(--white);
      font-weight: 850;
    }

    .stats {
      width: min(760px, 100%);
      margin: 30px auto 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .stat {
      padding: 14px 10px;
      text-align: center;
    }

    .stat + .stat { border-left: 1px solid var(--line); }
    .stat span { display: block; color: var(--muted); font-size: 13px; font-weight: 800; text-transform: uppercase; }
    .stat strong { display: block; margin-top: 4px; color: var(--red-dark); font-size: 27px; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(45, 0, 8, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal.show { display: flex; }

    .result-card,
    .question-card {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      border: 5px solid var(--gold);
      border-radius: 22px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }

    .result-card {
      padding: 30px;
      background: linear-gradient(145deg, var(--red-dark), var(--red));
      color: var(--white);
      text-align: center;
    }

    .result-card h2 {
      margin: 0 0 20px;
      color: var(--gold-light);
      font-size: clamp(25px, 4vw, 42px);
      text-transform: uppercase;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .result-item {
      border: 3px solid var(--gold);
      border-radius: 14px;
      padding: 16px 10px;
      background: var(--white);
      color: var(--red-dark);
    }

    .result-item span {
      display: block;
      color: #6e3100;
      font-size: 14px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .result-item strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(48px, 8vw, 88px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .result-note { margin: 18px 0 0; color: #fff2ba; font-weight: 700; }

    .question-card { background: var(--white); }

    .question-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 17px 20px;
      background: linear-gradient(135deg, var(--red-dark), var(--red));
      color: var(--white);
    }

    .question-header h2 { margin: 0; font-size: 22px; }

    .close-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border: 2px solid rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      font-size: 24px;
    }

    .question-body { padding: 24px; }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .meta-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff8df;
    }

    .meta-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .meta-item strong { display: block; margin-top: 5px; color: var(--red-dark); font-size: 18px; }

    .question-content {
      border-left: 7px solid var(--gold);
      border-radius: 12px;
      padding: 20px;
      background: #fffdf6;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 1100;
      max-width: min(620px, calc(100% - 30px));
      transform: translate(-50%, 150%);
      opacity: 0;
      border-radius: 12px;
      padding: 13px 18px;
      background: #262626;
      color: var(--white);
      text-align: center;
      font-weight: 750;
      transition: 0.25s ease;
    }

    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast.error { background: var(--danger); }

    @media (max-width: 900px) {
      .header { padding: 22px 105px 22px 18px; justify-content: flex-start; }
      .header h1 { text-align: left; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .file-label { grid-column: 1 / -1; }
      .draw-grid { gap: 24px; }
      .draw-card { min-height: 285px; }
      .card-value { font-size: clamp(76px, 17vw, 120px); }
    }

    @media (max-width: 620px) {
      .app { padding: 0; }
      .shell { min-height: 100vh; border: 0; }
      .header { min-height: 98px; }
      .fullscreen-btn { right: 10px; padding: 0 8px; font-size: 0; }
      .fullscreen-btn::after { content: "⛶"; font-size: 22px; }
      .toolbar { grid-template-columns: 1fr; }
      .file-label { grid-column: auto; }
      .main { padding: 24px 13px 34px; }
      .draw-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .draw-card { min-height: 220px; padding: 10px 9px 16px; border-width: 3px; }
      .card-label { padding: 8px 4px; font-size: 17px; }
      .card-value { font-size: clamp(58px, 25vw, 92px); }
      .result-grid, .meta { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      .stat strong { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="header">
        <h1>Bốc thăm ngẫu nhiên</h1>
        <button id="fullScreenBtn" class="fullscreen-btn" type="button">⛶ TOÀN MÀN HÌNH</button>
      </header>

      <section class="main">
        <div class="draw-grid">
          <article class="draw-card">
            <div class="card-label">Nhóm</div>
            <div id="groupDisplay" class="card-value" aria-live="polite">1</div>
            <div class="card-line"></div>
          </article>

          <article class="draw-card">
            <div class="card-label">Câu hỏi</div>
            <div id="questionDisplay" class="card-value" aria-live="polite">1</div>
            <div class="card-line"></div>
          </article>
        </div>

        <div class="controls">
          <button id="spinBtn" class="spin-btn" type="button" disabled>BẮT ĐẦU BỐC THĂM</button>
          <p id="statusText" class="status">HÃY CHỌN FILE EXCEL ĐỂ BẮT ĐẦU</p>

          <div class="secondary-controls">
            <button id="viewBtn" class="view-btn" type="button" disabled>XEM NỘI DUNG CÂU HỎI</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><span>Tổng số câu</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>Đã bốc</span><strong id="usedCount">0</strong></div>
          <div class="stat"><span>Còn lại</span><strong id="remainingCount">0</strong></div>
        </div>
      </section>

      <!-- Thanh nạp và quản lý dữ liệu được đặt dưới cùng giao diện -->
      <section class="toolbar" aria-label="Công cụ dữ liệu">
        <label id="fileLabel" class="file-label" for="excelFile">📁 CHỌN FILE DULIEUBOCTHAM.XLSX</label>
        <input id="excelFile" type="file" accept=".xlsx,.xls,.xlsm" />
        <button id="sampleBtn" class="small-btn" type="button">TẢI EXCEL MẪU</button>
        <button id="resetBtn" class="small-btn" type="button" disabled>ĐẶT LẠI</button>
        <button id="viewBtnTop" class="small-btn" type="button" disabled>XEM CÂU HỎI</button>
      </section>
    </section>
  </main>

  <div id="resultModal" class="modal" role="dialog" aria-modal="true" aria-label="Kết quả bốc thăm">
    <section class="result-card">
      <h2>Kết quả bốc thăm</h2>
      <div class="result-grid">
        <div class="result-item"><span>Nhóm</span><strong id="resultGroup">-</strong></div>
        <div class="result-item"><span>Câu hỏi</span><strong id="resultQuestion">-</strong></div>
      </div>
      <p class="result-note">Thông báo tự đóng sau 3 giây</p>
    </section>
  </div>

  <div id="questionModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="questionTitle">
    <section class="question-card">
      <header class="question-header">
        <h2 id="questionTitle">Nội dung câu hỏi</h2>
        <button id="closeQuestionBtn" class="close-btn" type="button" aria-label="Đóng">×</button>
      </header>
      <div class="question-body">
        <div class="meta">
          <div class="meta-item"><span>Nhóm</span><strong id="modalTopic">---</strong></div>
          <div class="meta-item"><span>Mã câu hỏi</span><strong id="modalQuestionCode">---</strong></div>
        </div>
        <div id="modalQuestionContent" class="question-content">---</div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    // ===== THÔNG SỐ QUAY =====
    const ROLL_DURATION_MS = 3000;  // Quay trong 3 giây
    const ROLL_INTERVAL_MS = 100;   // Nhảy số sau mỗi 0,1 giây
    const RESULT_VISIBLE_MS = 2000; // Hiện thông báo kết quả 2 giây

    // ===== DỮ LIỆU =====
    let questions = [];
    let usedKeys = new Set();
    let currentResult = null;
    let isRolling = false;
    let storageKey = "";
    let resultTimer = null;

    // ===== GIAO DIỆN =====
    const excelFile = document.getElementById("excelFile");
    const fileLabel = document.getElementById("fileLabel");
    const sampleBtn = document.getElementById("sampleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const spinBtn = document.getElementById("spinBtn");
    const viewBtn = document.getElementById("viewBtn");
    const viewBtnTop = document.getElementById("viewBtnTop");
    const fullScreenBtn = document.getElementById("fullScreenBtn");
    const groupDisplay = document.getElementById("groupDisplay");
    const questionDisplay = document.getElementById("questionDisplay");
    const statusText = document.getElementById("statusText");
    const totalCount = document.getElementById("totalCount");
    const usedCount = document.getElementById("usedCount");
    const remainingCount = document.getElementById("remainingCount");
    const resultModal = document.getElementById("resultModal");
    const resultGroup = document.getElementById("resultGroup");
    const resultQuestion = document.getElementById("resultQuestion");
    const questionModal = document.getElementById("questionModal");
    const closeQuestionBtn = document.getElementById("closeQuestionBtn");
    const modalTopic = document.getElementById("modalTopic");
    const modalQuestionCode = document.getElementById("modalQuestionCode");
    const modalQuestionContent = document.getElementById("modalQuestionContent");
    const toast = document.getElementById("toast");

    // ===== HÀM TIỆN ÍCH =====
    function clean(value) {
      // Chuẩn hóa Unicode NFC để dấu tiếng Việt từ Excel hiển thị ổn định.
      return String(value ?? "").normalize("NFC").trim();
    }

    function normalize(value) {
      return clean(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function findValue(row, acceptedHeaders) {
      const aliases = acceptedHeaders.map(normalize);
      for (const [key, value] of Object.entries(row)) {
        if (aliases.includes(normalize(key))) return value;
      }
      return "";
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)] || null;
    }

    function numericPart(value) {
      const match = clean(value).match(/\d+/);
      return match ? Number(match[0]) : Number.NaN;
    }

    function keyFor(item) {
      return `${item.topicCode}|${item.questionCode}`;
    }

    function showToast(message, type = "normal") {
      toast.textContent = message;
      toast.className = `toast show${type === "error" ? " error" : ""}`;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3300);
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function makeStorageKey(file) {
      const raw = `${file.name}|${file.size}|${file.lastModified}`;
      return `boc_tham_2_o_${btoa(unescape(encodeURIComponent(raw))).replace(/=+$/g, "")}`;
    }

    function loadUsed() {
      usedKeys = new Set();
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        if (Array.isArray(saved)) usedKeys = new Set(saved.map(clean));
      } catch (error) {
        console.warn("Không đọc được trạng thái đã bốc:", error);
      }
    }

    function saveUsed() {
      try {
        localStorage.setItem(storageKey, JSON.stringify([...usedKeys]));
      } catch (error) {
        console.warn("Không lưu được trạng thái đã bốc:", error);
      }
    }

    function updateControls() {
      const remaining = questions.filter(item => !usedKeys.has(keyFor(item))).length;
      totalCount.textContent = String(questions.length);
      usedCount.textContent = String(questions.length - remaining);
      remainingCount.textContent = String(remaining);

      spinBtn.disabled = isRolling || questions.length === 0 || remaining === 0;
      resetBtn.disabled = isRolling || questions.length === 0 || usedKeys.size === 0;
      viewBtn.disabled = isRolling || !currentResult;
      viewBtnTop.disabled = isRolling || !currentResult;
      excelFile.disabled = isRolling;
      sampleBtn.disabled = isRolling;

      if (!isRolling && questions.length > 0) {
        if (remaining > 0) {
          setStatus(`SẴN SÀNG · CÒN ${remaining} CÂU CHƯA BỐC`);
        } else {
          setStatus("ĐÃ BỐC HẾT CÂU HỎI · NHẤN ĐẶT LẠI ĐỂ TIẾP TỤC");
        }
      }
    }

    // ===== ĐỌC ĐÚNG ĐỊNH DẠNG EXCEL QUY ĐỊNH =====
    // Sheet ChuDe: MaChuDe | TenChuDe
    // Sheet CauHoi: MaCauHoi | NoiDungCauHoi
    // Trong sheet CauHoi, mỗi nhóm bắt đầu lại từ MaCauHoi = 1.
    function readTopicRows(workbook) {
      const exactName = workbook.SheetNames.find(name => normalize(name) === "chude");
      if (!exactName) throw new Error('Không tìm thấy sheet "ChuDe".');

      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[exactName], {
        defval: "",
        raw: false
      });

      const topics = rows.map((row, index) => ({
        code: clean(findValue(row, ["MaChuDe", "Mã chủ đề"])),
        name: clean(findValue(row, ["TenChuDe", "Tên chủ đề"])),
        excelRow: index + 2
      })).filter(item => item.code && item.name);

      if (topics.length === 0) {
        throw new Error('Sheet "ChuDe" phải có hai cột MaChuDe và TenChuDe.');
      }

      const uniqueCodes = new Set();
      topics.forEach(topic => {
        const key = topic.code.toLowerCase();
        if (uniqueCodes.has(key)) {
          throw new Error(`Mã chủ đề bị trùng tại dòng ${topic.excelRow}: ${topic.code}`);
        }
        uniqueCodes.add(key);
      });

      return topics;
    }

    function topicNumberFromContent(content) {
      const match = clean(content).match(/(?:nhóm|nhom|chủ\s*đề|chu\s*de)\s*(?:số\s*)?(\d+)/i);
      return match ? Number(match[1]) : Number.NaN;
    }

    function readQuestionRows(workbook, topics) {
      const exactName = workbook.SheetNames.find(name => normalize(name) === "cauhoi");
      if (!exactName) throw new Error('Không tìm thấy sheet "CauHoi".');

      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[exactName], {
        defval: "",
        raw: false
      });

      const source = rows.map((row, index) => ({
        questionCode: clean(findValue(row, ["MaCauHoi", "Mã câu hỏi"])),
        content: clean(findValue(row, ["NoiDungCauHoi", "Nội dung câu hỏi"])),
        excelRow: index + 2
      })).filter(item => item.questionCode || item.content);

      if (source.length === 0) {
        throw new Error('Sheet "CauHoi" phải có hai cột MaCauHoi và NoiDungCauHoi.');
      }

      let topicIndex = 0;
      let previousQuestionNumber = Number.NaN;
      const mapped = [];

      source.forEach((row, index) => {
        if (!row.questionCode || !row.content) {
          throw new Error(`Sheet "CauHoi" thiếu mã hoặc nội dung tại dòng ${row.excelRow}.`);
        }

        const detectedTopicNumber = topicNumberFromContent(row.content);
        const currentQuestionNumber = numericPart(row.questionCode);

        // Ưu tiên nhận biết số nhóm trong nội dung như "nhóm 2" hoặc "chủ đề 2".
        if (Number.isFinite(detectedTopicNumber) && detectedTopicNumber >= 1 && detectedTopicNumber <= topics.length) {
          topicIndex = detectedTopicNumber - 1;
        } else if (index > 0 && Number.isFinite(currentQuestionNumber) && Number.isFinite(previousQuestionNumber)) {
          // Nếu mã câu quay lại 1 hoặc nhỏ hơn mã trước, chuyển sang chủ đề kế tiếp.
          if (currentQuestionNumber <= previousQuestionNumber) topicIndex += 1;
        }

        if (!topics[topicIndex]) {
          throw new Error(
            `Số nhóm câu hỏi trong sheet "CauHoi" nhiều hơn danh sách ở sheet "ChuDe". Kiểm tra dòng ${row.excelRow}.`
          );
        }

        const topic = topics[topicIndex];
        mapped.push({
          topicCode: topic.code,
          topicName: topic.name,
          questionCode: row.questionCode,
          content: row.content,
          excelRow: row.excelRow
        });

        previousQuestionNumber = currentQuestionNumber;
      });

      const seen = new Set();
      mapped.forEach(item => {
        const key = keyFor(item).toLowerCase();
        if (seen.has(key)) {
          throw new Error(
            `Mã câu hỏi ${item.questionCode} bị trùng trong nhóm ${item.topicCode}. Kiểm tra dòng ${item.excelRow}.`
          );
        }
        seen.add(key);
      });

      return mapped;
    }

    excelFile.addEventListener("change", async event => {
      const file = event.target.files?.[0];
      if (!file) return;

      if (typeof XLSX === "undefined") {
        showToast("Không tải được thư viện đọc Excel. Hãy kiểm tra Internet.", "error");
        return;
      }

      if (!/\.(xlsx|xls|xlsm)$/i.test(file.name)) {
        showToast("Vui lòng chọn file Excel .xlsx, .xls hoặc .xlsm.", "error");
        return;
      }

      try {
        setStatus("ĐANG ĐỌC DỮ LIỆU EXCEL...");
        const arrayBuffer = await file.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });
        const topics = readTopicRows(workbook);
        questions = readQuestionRows(workbook, topics);

        storageKey = makeStorageKey(file);
        loadUsed();

        // Chỉ giữ trạng thái đã bốc còn tồn tại trong file hiện tại.
        const validKeys = new Set(questions.map(keyFor));
        usedKeys = new Set([...usedKeys].filter(key => validKeys.has(key)));
        saveUsed();

        currentResult = null;
        groupDisplay.textContent = "-";
        questionDisplay.textContent = "-";
        fileLabel.textContent = `✅ ${file.name} · ${topics.length} NHÓM · ${questions.length} CÂU`;
        updateControls();
        showToast(`Đã nạp ${topics.length} nhóm và ${questions.length} câu hỏi.`);
      } catch (error) {
        console.error(error);
        questions = [];
        usedKeys = new Set();
        currentResult = null;
        groupDisplay.textContent = "LỖI";
        questionDisplay.textContent = "LỖI";
        setStatus(error.message || "KHÔNG ĐỌC ĐƯỢC FILE EXCEL");
        updateControls();
        showToast(error.message || "Không đọc được file Excel.", "error");
      }
    });

    // ===== QUAY SỐ 2 Ô ĐỒNG THỜI =====
    function startRolling() {
      if (isRolling) return;

      const available = questions.filter(item => !usedKeys.has(keyFor(item)));
      if (available.length === 0) {
        showToast("Đã hết câu hỏi chưa bốc.", "error");
        updateControls();
        return;
      }

      // Chọn trước kết quả cuối để hai ô luôn thuộc cùng một câu hỏi.
      const finalItem = randomItem(available);
      if (!finalItem) return;

      isRolling = true;
      currentResult = null;
      resultModal.classList.remove("show");
      window.clearTimeout(resultTimer);
      groupDisplay.classList.add("rolling");
      questionDisplay.classList.add("rolling");
      setStatus("ĐANG BỐC THĂM...");
      updateControls();

      const rollingPool = questions;
      const intervalId = window.setInterval(() => {
        const preview = randomItem(rollingPool);
        if (!preview) return;
        groupDisplay.textContent = preview.topicCode;
        questionDisplay.textContent = preview.questionCode;
      }, ROLL_INTERVAL_MS);

      window.setTimeout(() => {
        window.clearInterval(intervalId);
        groupDisplay.classList.remove("rolling");
        questionDisplay.classList.remove("rolling");

        currentResult = finalItem;
        usedKeys.add(keyFor(finalItem));
        saveUsed();

        groupDisplay.textContent = finalItem.topicCode;
        questionDisplay.textContent = finalItem.questionCode;
        resultGroup.textContent = finalItem.topicCode;
        resultQuestion.textContent = finalItem.questionCode;
        resultModal.classList.add("show");

        isRolling = false;
        updateControls();
        setStatus("ĐÃ CÓ KẾT QUẢ · NHẤN XEM NỘI DUNG CÂU HỎI");

        resultTimer = window.setTimeout(() => {
          resultModal.classList.remove("show");
        }, RESULT_VISIBLE_MS);
      }, ROLL_DURATION_MS);
    }

    spinBtn.addEventListener("click", startRolling);

    document.addEventListener("keydown", event => {
      const target = event.target;
      const typing = target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement;
      if (event.code === "Space" && !typing && !spinBtn.disabled) {
        event.preventDefault();
        startRolling();
      }
      if (event.key === "Escape") {
        resultModal.classList.remove("show");
        questionModal.classList.remove("show");
      }
    });

    // ===== XEM NỘI DUNG CÂU HỎI =====
    function openQuestion() {
      if (!currentResult) return;
      modalTopic.textContent = `${currentResult.topicCode} — ${currentResult.topicName}`;
      modalQuestionCode.textContent = currentResult.questionCode;
      modalQuestionContent.textContent = currentResult.content;
      questionModal.classList.add("show");
    }

    viewBtn.addEventListener("click", openQuestion);
    viewBtnTop.addEventListener("click", openQuestion);
    closeQuestionBtn.addEventListener("click", () => questionModal.classList.remove("show"));
    questionModal.addEventListener("click", event => {
      if (event.target === questionModal) questionModal.classList.remove("show");
    });
    resultModal.addEventListener("click", event => {
      if (event.target === resultModal) resultModal.classList.remove("show");
    });

    // ===== ĐẶT LẠI TOÀN BỘ LƯỢT BỐC =====
    resetBtn.addEventListener("click", () => {
      if (isRolling || questions.length === 0) return;
      const accepted = window.confirm(`Đặt lại ${usedKeys.size} câu đã bốc để quay lại từ đầu?`);
      if (!accepted) return;

      usedKeys.clear();
      saveUsed();
      currentResult = null;
      groupDisplay.textContent = "-";
      questionDisplay.textContent = "-";
      updateControls();
      showToast("Đã đặt lại toàn bộ lượt bốc.");
    });

    // ===== TẠO FILE EXCEL MẪU ĐÚNG 3 SHEET =====
    sampleBtn.addEventListener("click", () => {
      if (typeof XLSX === "undefined") {
        showToast("Không tải được thư viện Excel.", "error");
        return;
      }

      const topicData = [
        { MaChuDe: 1, TenChuDe: "Nhóm 1: Chủ đề, Mục tiêu và Động lực phát triển" },
        { MaChuDe: 2, TenChuDe: "Nhóm 2: Xây dựng Đảng và Hệ thống chính trị" },
        { MaChuDe: 3, TenChuDe: "Nhóm 3: Phát triển Kinh tế - Xã hội" }
      ];

      const questionData = [
        { MaCauHoi: 1, NoiDungCauHoi: "Câu hỏi 1 của chủ đề 1: Nhập nội dung tại đây." },
        { MaCauHoi: 2, NoiDungCauHoi: "Câu hỏi 2 của chủ đề 1: Nhập nội dung tại đây." },
        { MaCauHoi: 3, NoiDungCauHoi: "Câu hỏi 3 của chủ đề 1: Nhập nội dung tại đây." },
        { MaCauHoi: 1, NoiDungCauHoi: "Câu hỏi 1 của chủ đề 2: Nhập nội dung tại đây." },
        { MaCauHoi: 2, NoiDungCauHoi: "Câu hỏi 2 của chủ đề 2: Nhập nội dung tại đây." },
        { MaCauHoi: 1, NoiDungCauHoi: "Câu hỏi 1 của chủ đề 3: Nhập nội dung tại đây." },
        { MaCauHoi: 2, NoiDungCauHoi: "Câu hỏi 2 của chủ đề 3: Nhập nội dung tại đây." }
      ];

      const guideData = [
        { HuongDan: "1. Không đổi tên hai sheet ChuDe và CauHoi." },
        { HuongDan: "2. Sheet ChuDe giữ đúng cột MaChuDe và TenChuDe." },
        { HuongDan: "3. Sheet CauHoi giữ đúng cột MaCauHoi và NoiDungCauHoi." },
        { HuongDan: "4. Câu hỏi của từng nhóm phải đặt liền nhau." },
        { HuongDan: "5. Sang nhóm mới, MaCauHoi bắt đầu lại từ 1." },
        { HuongDan: "6. Mỗi nhóm được phép có số lượng câu khác nhau, ví dụ 5 đến 10 câu." }
      ];

      const workbook = XLSX.utils.book_new();
      const topicSheet = XLSX.utils.json_to_sheet(topicData);
      const questionSheet = XLSX.utils.json_to_sheet(questionData);
      const guideSheet = XLSX.utils.json_to_sheet(guideData);

      topicSheet["!cols"] = [{ wch: 15 }, { wch: 60 }];
      questionSheet["!cols"] = [{ wch: 15 }, { wch: 95 }];
      guideSheet["!cols"] = [{ wch: 100 }];

      XLSX.utils.book_append_sheet(workbook, topicSheet, "ChuDe");
      XLSX.utils.book_append_sheet(workbook, questionSheet, "CauHoi");
      XLSX.utils.book_append_sheet(workbook, guideSheet, "HuongDan");
      XLSX.writeFile(workbook, "DuLieuBocTham_Mau.xlsx");
      showToast("Đã tạo file Excel mẫu đúng định dạng quy định.");
    });

    // ===== TOÀN MÀN HÌNH =====
    fullScreenBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullScreenBtn.textContent = "✕ THOÁT TOÀN MÀN HÌNH";
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        showToast("Trình duyệt không cho phép mở toàn màn hình.", "error");
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) fullScreenBtn.textContent = "⛶ TOÀN MÀN HÌNH";
    });
  </script>
